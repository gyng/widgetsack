<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<style>
			html,
			body {
				margin: 0;
				height: 100%;
			}
			body {
				display: flex;
				align-items: center;
				justify-content: center;
				background: radial-gradient(120% 120% at 30% 20%, #1a3640, #0d1f26 70%);
				color: #dceff4;
				font:
					14px/1.5 'Segoe UI',
					system-ui,
					sans-serif;
			}
			.card {
				text-align: center;
			}
			.temp {
				font-size: 44px;
				font-weight: 600;
				color: #8fd4e2;
			}
			.cap {
				opacity: 0.65;
				letter-spacing: 0.04em;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<div class="temp">🌤️ 21°C</div>
			<div class="cap">embedded web content</div>
		</div>
	</body>
</html>
