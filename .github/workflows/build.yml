name: "Build release"
on:
  workflow_dispatch:
  release:
    types: [released]

jobs:
  build-tauri:
    permissions:
      contents: write
      id-token: write # mint the OIDC token actions/attest-build-provenance signs the provenance with
      attestations: write # write the provenance attestation to the repo
    strategy:
      fail-fast: false
      matrix:
        # platform: [macos-latest, ubuntu-22.04, windows-latest]
        platform: [windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04' # This must match the platform value defined above.
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
        # webkitgtk 4.0 is for Tauri v1 - webkitgtk 4.1 is for Tauri v2.
        # You can remove the one that doesn't apply to your app to speed up the workflow a bit.
      - uses: Swatinem/rust-cache@v2
        with:
          # Restore the Rust cache, but DON'T save one here. This workflow only runs on `release`
          # (which executes on the tag ref) and `workflow_dispatch`. A cache saved on a tag ref can
          # never be restored — the next release is a new tag, tag refs don't share caches, and this
          # job never runs on `main` to seed a default-branch cache — so saving just accumulates
          # ~620 MB of dead, un-restorable cache per release, pushing the repo over the 10 GB limit and
          # evicting the test.yml caches that DO get hit. The test workflow owns the useful Rust cache.
          save-if: false
      - name: install frontend dependencies
        run: npm ci
        working-directory: ./client
      - uses: tauri-apps/tauri-action@v0
        id: tauri
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Build only and emit `artifactPaths` — do NOT upload here. The in-action release upload has
          # flaked transiently (build succeeds, the upload errors, and the release is left with no
          # assets), and re-running it means a full ~10 min rebuild. The retried step below is the sole
          # uploader, so a transient flake just retries the cheap upload instead.
          # tauri-action@v0's bundled CLI is too old for the v2 config schema; pin a
          # current v2 CLI matching the tauri 2.11 crates.
          tauriScript: npx @tauri-apps/cli@2
      - name: Upload bundles to the release (retried)
        # Only on a real release event (workflow_dispatch builds have no release to attach to, matching
        # the prior behaviour where releaseId was empty).
        if: github.event_name == 'release'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event.release.tag_name }}
          ARTIFACTS: ${{ steps.tauri.outputs.artifactPaths }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # artifactPaths is a JSON array of absolute bundle paths. On the Windows runner jq emits
          # CRLF, and `readarray -t` only strips the trailing \n — the surviving \r made the path
          # `…setup.exe\r`, which `gh release upload` reported as "no matches found". Strip \r, and
          # normalise the Windows backslashes to forward slashes so gh's path/glob handling can't
          # mistake a backslash for an escape.
          readarray -t FILES < <(printf '%s' "$ARTIFACTS" | jq -r '.[]' | tr -d '\r' | tr '\\' '/')
          if [ "${#FILES[@]}" -eq 0 ]; then
            echo "::error::tauri-action produced no artifacts to upload"; exit 1
          fi
          printf 'Uploading %s artifact(s) to %s:\n' "${#FILES[@]}" "$TAG"
          printf '  %s\n' "${FILES[@]}"
          # --clobber makes the upload idempotent, so a retry after a partial upload just overwrites.
          for attempt in 1 2 3 4 5; do
            if gh release upload "$TAG" "${FILES[@]}" --clobber --repo "$REPO"; then
              echo "Release assets attached on attempt $attempt."; exit 0
            fi
            echo "Upload attempt $attempt failed; retrying in 20s…"; sleep 20
          done
          echo "::error::release upload failed after 5 attempts"; exit 1
      - name: Attest build provenance
        # SLSA provenance for the exact installer we just published — proves it was built by THIS
        # workflow from THIS commit (no reproducible build needed). Verify a downloaded asset with:
        #   gh attest verify widgetsack_<ver>_x64-setup.exe --repo gyng/widgetsack
        # Release events only: dispatch builds aren't published, so there's nothing to attest.
        if: github.event_name == 'release'
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: "target/release/bundle/nsis/*-setup.exe"
